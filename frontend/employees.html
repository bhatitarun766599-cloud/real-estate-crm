<!DOCTYPE html>
<html>
<head>

<title>Employees</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<div class="bg-white border-b px-6 py-4 flex justify-between items-center">
  <h1 class="text-lg font-semibold text-gray-800">👥 Employees</h1>
</div>

<div class="p-6">

  <!-- ADD EMPLOYEE -->
  <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">

    <h2 class="text-lg font-semibold mb-4">Add Employee</h2>

    <div class="grid md:grid-cols-4 gap-3">

      <input
        id="name"
        placeholder="Name"
        class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none"
      />

      <input
        id="email"
        placeholder="Email"
        class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none"
      />

      <input
        id="password"
        type="password"
        placeholder="Password"
        class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none"
      />

      <button
        onclick="addEmployee()"
        class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 transition">
        Add
      </button>

    </div>

  </div>


  <!-- EMPLOYEE TABLE -->
  <div class="bg-white p-6 rounded-2xl shadow-sm">

    <h2 class="text-lg font-semibold mb-4">Employee List</h2>

    <div class="overflow-x-auto">

      <table class="w-full text-sm">

        <thead>
          <tr class="border-b text-gray-500">
            <th class="text-left p-3">Name</th>
            <th class="text-left p-3">Email</th>
          </tr>
        </thead>

        <tbody id="employeeTable"></tbody>

      </table>

    </div>

  </div>

</div>


<script>

/* ===============================
   ADD EMPLOYEE
================================ */

async function addEmployee(){

 const name = document.getElementById("name").value;
 const email = document.getElementById("email").value;
 const password = document.getElementById("password").value;

 if(!name || !email || !password){
   alert("All fields required");
   return;
 }

 await apiRequest("/employees/add","POST",{name,email,password});

 // clear fields
 document.getElementById("name").value="";
 document.getElementById("email").value="";
 document.getElementById("password").value="";

 loadEmployees();
}


/* ===============================
   LOAD EMPLOYEES
================================ */

async function loadEmployees(){

 const employees = await apiRequest("/employees/all");

 const table = document.getElementById("employeeTable");
 table.innerHTML="";

 employees.forEach(e=>{

 table.innerHTML += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3 font-medium">${e.name}</td>
<td class="p-3 text-gray-600">${e.email}</td>

</tr>

`

 });

}


/* INIT */
loadEmployees();

</script>

</body>
</html>
