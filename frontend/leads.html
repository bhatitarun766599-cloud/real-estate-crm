<!DOCTYPE html>
<html>
<head>

<title>CRM Leads</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<div class="bg-white border-b px-6 py-4 flex justify-between items-center">
  <h1 class="text-lg font-semibold text-gray-800">📋 Leads</h1>
</div>

<div class="p-6">

  <!-- ADD LEAD -->
  <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">

    <h2 class="text-lg font-semibold mb-4">Add New Lead</h2>

    <div class="grid md:grid-cols-4 gap-3">

      <input id="name" placeholder="Name" class="input"/>
      <input id="phone" placeholder="Phone" class="input"/>
      <input id="email" placeholder="Email" class="input"/>
      <input id="city" placeholder="City" class="input"/>

      <input id="property" placeholder="Property Interest" class="input"/>
      <input id="budget" placeholder="Budget" class="input"/>
      <input id="source" placeholder="Source" class="input"/>
      <input id="notes" placeholder="Notes" class="input"/>

      <button onclick="addLead()"
        class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 transition">
        Add Lead
      </button>

    </div>

  </div>


  <!-- LEADS TABLE -->
  <div class="bg-white p-6 rounded-2xl shadow-sm">

    <div class="flex justify-between mb-4">
      <h2 class="text-lg font-semibold">All Leads</h2>
      <input id="search"
        placeholder="Search..."
        class="input w-64"
        onkeyup="searchLeads()">
    </div>

    <div class="overflow-x-auto">

      <table class="w-full text-sm">

        <thead>
          <tr class="border-b text-gray-500">
            <th class="text-left p-3">Name</th>
            <th class="text-left p-3">Phone</th>
            <th class="text-left p-3">City</th>
            <th class="text-left p-3">Budget</th>
            <th class="text-left p-3">Status</th>
          </tr>
        </thead>

        <tbody id="leadTable"></tbody>

      </table>

    </div>

  </div>

</div>


<style>
.input{
  border:1px solid #e5e7eb;
  padding:8px;
  border-radius:8px;
  outline:none;
}
.input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,0.2);
}
</style>


<script>

/* ===============================
   AUTH CHECK
================================ */

const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}


/* ===============================
   SEARCH
================================ */

function searchLeads(){
 const input = document.getElementById("search").value.toLowerCase()
 const rows = document.querySelectorAll("#leadTable tr")

 rows.forEach(row=>{
  row.style.display =
   row.innerText.toLowerCase().includes(input) ? "" : "none"
 })
}


/* ===============================
   LOAD LEADS
================================ */

async function loadLeads(){

 const data = await apiRequest("/leads/all");

 const table = document.getElementById("leadTable");
 table.innerHTML = "";

 data.forEach(lead => {

  table.innerHTML += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3 font-medium">${lead.name}</td>
<td class="p-3">${lead.phone}</td>
<td class="p-3">${lead.city || ""}</td>
<td class="p-3">${lead.budget || ""}</td>

<td class="p-3">

<select
 class="border rounded p-1"
 onchange="updateStatus(${lead.id},this.value)">

<option ${lead.status==="New"?"selected":""}>New</option>
<option ${lead.status==="Interested"?"selected":""}>Interested</option>
<option ${lead.status==="Site Visit"?"selected":""}>Site Visit</option>
<option ${lead.status==="Deal Closed"?"selected":""}>Deal Closed</option>
<option ${lead.status==="Lost Lead"?"selected":""}>Lost Lead</option>

</select>

</td>

</tr>

`;

 });

}


/* ===============================
   ADD LEAD
================================ */

async function addLead(){

 const lead = {

  name:document.getElementById("name").value,
  phone:document.getElementById("phone").value,
  email:document.getElementById("email").value,
  city:document.getElementById("city").value,
  property_interest:document.getElementById("property").value,
  budget:document.getElementById("budget").value,
  source:document.getElementById("source").value,
  notes:document.getElementById("notes").value

 };

 await apiRequest("/leads/add","POST",lead);

 loadLeads();
}


/* ===============================
   UPDATE STATUS
================================ */

async function updateStatus(id,status){

 await apiRequest(`/leads/status/${id}`,"PUT",{status});

}


/* INIT */
loadLeads();

</script>

</body>
</html>
