<!DOCTYPE html>
<html>
<head>

<title>Manager Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<div class="bg-white border-b px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-semibold">👨‍💼 Manager Dashboard</h1>
  <button onclick="logout()" class="text-red-500">Logout</button>
</div>

<div class="p-6">

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-4 mb-6">

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500">Total Leads</p>
      <h2 id="total" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500">Today Leads</p>
      <h2 id="today" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-gray-500">Employees</p>
      <h2 id="empCount" class="text-2xl font-bold">0</h2>
    </div>

  </div>

  <!-- EMPLOYEE PERFORMANCE -->
  <div class="bg-white p-6 rounded-xl shadow">

    <h2 class="text-lg font-semibold mb-4">Employee Performance</h2>

    <table class="w-full text-sm">
      <thead>
        <tr class="border-b text-gray-500">
          <th class="p-2 text-left">Employee</th>
          <th class="p-2 text-left">Leads</th>
        </tr>
      </thead>
      <tbody id="empTable"></tbody>
    </table>

  </div>

</div>

<script>

/* AUTH CHECK */
const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}

/* LOAD DATA */
async function loadStats(){

  const data = await apiRequest("/leads/manager-stats");

  document.getElementById("total").innerText = data.total;
  document.getElementById("today").innerText = data.today;
  document.getElementById("empCount").innerText = data.employees.length;

  const table = document.getElementById("empTable");
  table.innerHTML = "";

  data.employees.forEach(e=>{
    table.innerHTML += `
      <tr class="border-b">
        <td class="p-2">${e.name}</td>
        <td class="p-2">${e.total}</td>
      </tr>
    `;
  });

}

loadStats();

</script>

</body>
</html>
