<!DOCTYPE html>
<html>
<head>
<title>Real Estate CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold mb-4">Real Estate CRM Dashboard</h1>

<!-- FOLLOWUP WIDGETS -->

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-yellow-100 p-3 rounded">
<h2 class="font-bold">Today's Followups</h2>

<ul id="todayFollowups"></ul>
</div>

<div class="bg-red-100 p-3 rounded">
<h2 class="font-bold">Missed Followups</h2>
<ul id="missedFollowups"></ul>
</div>

<div class="bg-green-100 p-3 rounded">
<h2 class="font-bold">Upcoming Followups</h2>
<ul id="upcomingFollowups"></ul>
</div>

</div>

<!-- ADD LEAD -->

<div class="bg-white p-4 rounded shadow mb-6">

<h2 class="text-xl mb-3">Add Lead</h2>

<input id="name" placeholder="Name" class="border p-2 mr-2 mb-2">
<input id="phone" placeholder="Phone" class="border p-2 mr-2 mb-2">
<input id="city" placeholder="City" class="border p-2 mr-2 mb-2">

<br>

<input id="property" placeholder="Property Interest" class="border p-2 mr-2 mb-2">
<input id="budget" placeholder="Budget" class="border p-2 mr-2 mb-2">

<br>

<button onclick="addLead()" class="bg-blue-500 text-white px-4 py-2 rounded">
Add Lead
</button>

</div>

<!-- LEADS TABLE -->

<div class="bg-white p-4 rounded shadow">

<h2 class="text-xl mb-2">Leads</h2>
<input
id="search"
placeholder="Search leads..."
class="border p-2 mb-4 w-full"
onkeyup="searchLeads()">

<table class="w-full border">

<thead>
<tr class="bg-gray-200">

<th class="p-2">Name</th>
<th class="p-2">Phone</th>
<th class="p-2">City</th>
<th class="p-2">Property</th>
<th class="p-2">Budget</th>
<th class="p-2">Status</th>
<th class="p-2">Follow-up</th>
<th class="p-2">Assign</th>

</tr>
</thead>

<tbody id="leadsTable"></tbody>

</table>

</div>

<script>

async function checkNotifications(){

 const res = await fetch("http://localhost:3000/leads/today-followups")
 const data = await res.json()

 if(data.length > 0){
 alert("⚠ You have " + data.length + " followups today")
 }

}
function searchLeads(){

 const input=document.getElementById("search").value.toLowerCase()

 const rows=document.querySelectorAll("#leadsTable tr")

 rows.forEach(row=>{

 const text=row.innerText.toLowerCase()

 row.style.display=text.includes(input) ? "" : "none"

 })

}

async function addLead(){

 const name=document.getElementById("name").value
 const phone=document.getElementById("phone").value
 const city=document.getElementById("city").value
 const property=document.getElementById("property").value
 const budget=document.getElementById("budget").value

 await fetch("http://localhost:3000/leads/add",{

 method:"POST",
 headers:{ "Content-Type":"application/json" },

 body:JSON.stringify({
 name:name,
 phone:phone,
 city:city,
 property_interest:property,
 budget:budget,
 notes:"",
 source:"Manual",
 assigned_to:null
 })

 })

 loadLeads()

}

async function updateStatus(id,status){

 await fetch(`http://localhost:3000/leads/status/${id}`,{

 method:"PUT",
 headers:{ "Content-Type":"application/json" },
 body:JSON.stringify({status})

 })

 loadLeads()

}

async function assignLead(id,employee){

 await fetch(`http://localhost:3000/leads/assign/${id}`,{

 method:"PUT",
 headers:{ "Content-Type":"application/json" },

 body:JSON.stringify({
 employee_id:employee
 })

 })

 alert("Lead assigned")

}

async function addFollowup(id){

 const date = prompt("Enter followup date YYYY-MM-DD")
 const notes = prompt("Notes")

 await fetch("http://localhost:3000/leads/followup",{

 method:"POST",
 headers:{ "Content-Type":"application/json" },

 body:JSON.stringify({
 lead_id:id,
 followup_date:date,
 notes:notes
 })

 })

 alert("Followup added")

 loadFollowups()

}

async function loadLeads(){

 const res = await fetch("http://localhost:3000/leads/all")
 const leads = await res.json()

 const table=document.getElementById("leadsTable")
 table.innerHTML=""

 leads.forEach(lead=>{

 table.innerHTML += `

<tr>

<td class="border p-2">${lead.name}</td>
<td class="border p-2">${lead.phone}</td>
<td class="border p-2">${lead.city}</td>
<td class="border p-2">${lead.property_interest}</td>
<td class="border p-2">${lead.budget}</td>

<td class="border p-2">

<select onchange="updateStatus(${lead.id},this.value)">

<option>New Lead</option>
<option>Contacted</option>
<option>Follow-up</option>
<option>Interested</option>
<option>Deal in Progress</option>
<option>Deal Closed</option>
<option>Lost Lead</option>

</select>

</td>

<td class="border p-2">

<button onclick="addFollowup(${lead.id})"
class="bg-green-500 text-white px-2 py-1 rounded">

Follow-up

</button>

</td>

<td class="border p-2">

<select onchange="assignLead(${lead.id},this.value)">

<option value="">Assign</option>
<option value="1">Employee 1</option>
<option value="2">Employee 2</option>

</select>

</td>

</tr>

`

 })

}

async function loadFollowups(){

 const res = await fetch("http://localhost:3000/leads/today-followups")
 const data = await res.json()

 const list=document.getElementById("todayFollowups")

 list.innerHTML=""

 data.forEach(f=>{
 list.innerHTML += `<li>Lead ${f.lead_id} - ${f.notes}</li>`
 })

}

async function loadMissed(){

 const res = await fetch("http://localhost:3000/leads/missed-followups")
 const data = await res.json()

 const list=document.getElementById("missedFollowups")

 list.innerHTML=""

 data.forEach(f=>{
 list.innerHTML += `<li>Lead ${f.lead_id}</li>`
 })

}

async function loadUpcoming(){

 const res = await fetch("http://localhost:3000/leads/upcoming-followups")
 const data = await res.json()

 const list=document.getElementById("upcomingFollowups")

 list.innerHTML=""

 data.forEach(f=>{
 list.innerHTML += `<li>Lead ${f.lead_id}</li>`
 })

}

loadLeads()
loadFollowups()
loadMissed()
loadUpcoming()
checkNotifications()

</script>

</body>
</html>
