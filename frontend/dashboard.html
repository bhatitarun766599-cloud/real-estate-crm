<!DOCTYPE html>
<html>
<head>

<title>Manager Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<div class="bg-white border-b px-6 py-4 flex justify-between items-center">
  <h1 class="text-xl font-semibold text-gray-800">👨‍💼 Manager Dashboard</h1>
  <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
</div>

<div class="p-6">

  <!-- STATS -->
  <div class="grid grid-cols-3 gap-4 mb-6">

    <div class="bg-white p-4 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Total Leads</p>
      <h2 id="totalLeads" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Today</p>
      <h2 id="todayLeads" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Yesterday</p>
      <h2 id="yesterdayLeads" class="text-2xl font-bold">0</h2>
    </div>

  </div>

  <!-- ADD LEAD -->
  <div class="bg-white p-6 rounded-2xl shadow-sm mb-6">

    <h2 class="text-lg font-semibold mb-4">Add Lead</h2>

    <div class="grid md:grid-cols-3 gap-3">

      <input id="name" placeholder="Name" class="border p-2 rounded">
      <input id="phone" placeholder="Phone" class="border p-2 rounded">
      <input id="city" placeholder="City" class="border p-2 rounded">
      <input id="property" placeholder="Property" class="border p-2 rounded">
      <input id="budget" placeholder="Budget" class="border p-2 rounded">

    </div>

    <button onclick="addLead()"
      class="mt-4 bg-blue-600 text-white px-5 py-2 rounded">
      Add Lead
    </button>

  </div>

  <!-- LEADS -->
  <div class="bg-white p-6 rounded-2xl shadow-sm">

    <div class="flex justify-between mb-4">
      <h2 class="text-lg font-semibold">All Leads</h2>
      <input id="search"
        placeholder="Search..."
        class="border p-2 rounded text-sm"
        onkeyup="searchLeads()">
    </div>

    <div class="overflow-x-auto">

      <table class="w-full text-sm">

        <thead>
          <tr class="text-gray-500 border-b">
            <th class="p-2 text-left">Name</th>
            <th class="p-2 text-left">Phone</th>
            <th class="p-2 text-left">Source</th>
            <th class="p-2 text-left">Budget</th>
            <th class="p-2 text-left">Status</th>
            <th class="p-2 text-left">Actions</th>
          </tr>
        </thead>

        <tbody id="leadsTable"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

/* ===============================
   PROTECT
================================ */

/* ===============================
   SEARCH
================================ */
function searchLeads(){
 const input = document.getElementById("search").value.toLowerCase()
 const rows = document.querySelectorAll("#leadsTable tr")

 rows.forEach(row=>{
  row.style.display =
   row.innerText.toLowerCase().includes(input) ? "" : "none"
 })
}

/* ===============================
   LOAD STATS
================================ */
async function loadStats(){

 const stats = await apiRequest("/leads/stats");
 const leads = await apiRequest("/leads");

 document.getElementById("totalLeads").innerText = leads.length;
 document.getElementById("todayLeads").innerText = stats.today;
 document.getElementById("yesterdayLeads").innerText = stats.yesterday;

}

/* ===============================
   ADD LEAD
================================ */
async function addLead(){

 const lead = {
  name: document.getElementById("name").value,
  phone: document.getElementById("phone").value,
  city: document.getElementById("city").value,
  property_interest: document.getElementById("property").value,
  budget: document.getElementById("budget").value,
  notes:"",
  source:"Manual"
 };

 await apiRequest("/leads/add","POST",lead);

 loadLeads();
 loadStats();
}

/* ===============================
   LOAD LEADS
================================ */
async function loadLeads(){

 const leads = await apiRequest("/leads");
 const table = document.getElementById("leadsTable");

 table.innerHTML="";

 leads.forEach(l=>{

 table.innerHTML += `

<tr class="border-b hover:bg-gray-50">

<td class="p-2 font-medium">${l.name}</td>

<td class="p-2">
  ${l.phone}
  <div class="flex gap-2 mt-1">
    <a href="tel:${l.phone}" class="text-green-600 text-xs">📞</a>
    <a href="https://wa.me/${l.phone}" target="_blank" class="text-blue-600 text-xs">💬</a>
  </div>
</td>

<td class="p-2">${l.source || "-"}</td>
<td class="p-2">${l.budget || "-"}</td>

<td class="p-2">

<select
 class="border rounded p-1"
 onchange="updateLead(${l.id},this.value)">

<option ${l.status==="new"?"selected":""}>new</option>
<option ${l.status==="contacted"?"selected":""}>contacted</option>
<option ${l.status==="interested"?"selected":""}>interested</option>
<option ${l.status==="closed"?"selected":""}>closed</option>

</select>

</td>

<td class="p-2">
<button onclick="addFollowup(${l.id})"
 class="bg-green-500 text-white px-2 py-1 rounded text-xs">
 Follow-up
</button>
</td>

</tr>

`
 })

}

/* ===============================
   UPDATE
================================ */
async function updateLead(id,status){

 const remark = prompt("Remark (optional)");

 await apiRequest(`/leads/update/${id}`, "PUT", {
  status,
  remark
 });

}

/* ===============================
   FOLLOWUP
================================ */
async function addFollowup(id){

 const date = prompt("Date YYYY-MM-DD");
 const notes = prompt("Notes");

 await apiRequest("/leads/followup","POST",{
  lead_id:id,
  followup_date:date,
  notes:notes
 });

 alert("Follow-up added");

}

/* INIT */
loadStats();
loadLeads();

</script>

</body>
</html>
