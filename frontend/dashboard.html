<!DOCTYPE html>
<html>
<head>

<title>Real Estate CRM</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

<script src="api.js"></script>

</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold mb-4">
Real Estate CRM Dashboard
</h1>


<!-- FOLLOWUPS -->

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="bg-yellow-100 p-3 rounded">

<h2 class="font-bold">Today's Followups</h2>

<ul id="todayFollowups"></ul>

</div>


<div class="bg-red-100 p-3 rounded">

<h2 class="font-bold">Missed Followups</h2>

<ul id="missedFollowups"></ul>

</div>


<div class="bg-green-100 p-3 rounded">

<h2 class="font-bold">Upcoming Followups</h2>

<ul id="upcomingFollowups"></ul>

</div>

</div>


<!-- ADD LEAD -->

<div class="bg-white p-4 rounded shadow mb-6">

<h2 class="text-xl mb-3">Add Lead</h2>

<input id="name" placeholder="Name"
class="border p-2 mr-2 mb-2">

<input id="phone" placeholder="Phone"
class="border p-2 mr-2 mb-2">

<input id="city" placeholder="City"
class="border p-2 mr-2 mb-2">

<br>

<input id="property"
placeholder="Property Interest"
class="border p-2 mr-2 mb-2">

<input id="budget"
placeholder="Budget"
class="border p-2 mr-2 mb-2">

<br>

<button onclick="addLead()"
class="bg-blue-500 text-white px-4 py-2 rounded">

Add Lead

</button>

</div>



<!-- LEADS TABLE -->

<div class="bg-white p-4 rounded shadow">

<h2 class="text-xl mb-2">Leads</h2>

<input id="search"
placeholder="Search leads..."
class="border p-2 mb-4 w-full"
onkeyup="searchLeads()">

<table class="w-full border">

<thead>

<tr class="bg-gray-200">

<th class="p-2">Name</th>
<th class="p-2">Phone</th>
<th class="p-2">City</th>
<th class="p-2">Property</th>
<th class="p-2">Budget</th>
<th class="p-2">Status</th>
<th class="p-2">Follow-up</th>

</tr>

</thead>

<tbody id="leadsTable"></tbody>

</table>

</div>



<script>


function searchLeads(){

 const input =
 document.getElementById("search")
 .value
 .toLowerCase()

 const rows =
 document.querySelectorAll("#leadsTable tr")

 rows.forEach(row=>{

 const text =
 row.innerText.toLowerCase()

 row.style.display =
 text.includes(input) ? "" : "none"

 })

}



// ADD LEAD

async function addLead(){

 const lead = {

  name:
  document.getElementById("name").value,

  phone:
  document.getElementById("phone").value,

  city:
  document.getElementById("city").value,

  property_interest:
  document.getElementById("property").value,

  budget:
  document.getElementById("budget").value,

  notes:"",
  source:"Manual",
  assigned_to:null

 };

 await apiRequest("/leads/add","POST",lead)

 loadLeads()

}



// UPDATE STATUS

async function updateStatus(id,status){

 await apiRequest(
  `/leads/status/${id}`,
  "PUT",
  {status}
 )

}



// FOLLOWUP

async function addFollowup(id){

 const date =
 prompt("Enter followup date YYYY-MM-DD")

 const notes =
 prompt("Notes")

 await apiRequest("/leads/followup","POST",{

  lead_id:id,
  followup_date:date,
  notes:notes

 })

 alert("Followup added")

 loadFollowups()

}



// LOAD LEADS

async function loadLeads(){

 const leads =
 await apiRequest("/leads/all")

 const table =
 document.getElementById("leadsTable")

 table.innerHTML=""

 leads.forEach(lead=>{

 table.innerHTML += `

<tr>

<td class="border p-2">${lead.name}</td>

<td class="border p-2">${lead.phone}</td>

<td class="border p-2">${lead.city || ""}</td>

<td class="border p-2">
${lead.property_interest || ""}
</td>

<td class="border p-2">${lead.budget || ""}</td>

<td class="border p-2">

<select
onchange="updateStatus(${lead.id},this.value)">

<option ${lead.status==="New"?"selected":""}>
New
</option>

<option ${lead.status==="Interested"?"selected":""}>
Interested
</option>

<option ${lead.status==="Site Visit"?"selected":""}>
Site Visit
</option>

<option ${lead.status==="Deal Closed"?"selected":""}>
Deal Closed
</option>

<option ${lead.status==="Lost Lead"?"selected":""}>
Lost Lead
</option>

</select>

</td>

<td class="border p-2">

<button
onclick="addFollowup(${lead.id})"
class="bg-green-500 text-white px-2 py-1 rounded">

Follow-up

</button>

</td>

</tr>

`

 })

}



// FOLLOWUP WIDGETS

async function loadFollowups(){

 const data =
 await apiRequest("/leads/today-followups")

 const list =
 document.getElementById("todayFollowups")

 list.innerHTML=""

 data.forEach(f=>{

 list.innerHTML +=
 `<li>${f.name} - ${f.notes}</li>`

 })

}



async function loadMissed(){

 const data =
 await apiRequest("/leads/missed-followups")

 const list =
 document.getElementById("missedFollowups")

 list.innerHTML=""

 data.forEach(f=>{

 list.innerHTML +=
 `<li>${f.name}</li>`

 })

}



async function loadUpcoming(){

 const data =
 await apiRequest("/leads/upcoming-followups")

 const list =
 document.getElementById("upcomingFollowups")

 list.innerHTML=""

 data.forEach(f=>{

 list.innerHTML +=
 `<li>${f.name}</li>`

 })

}



loadLeads()

loadFollowups()

loadMissed()

loadUpcoming()

</script>


</body>
</html>
