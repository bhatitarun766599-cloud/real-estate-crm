<!DOCTYPE html>
<html>
<head>

<title>CRM Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-sm">

  <h2 class="text-xl font-semibold mb-6 text-center text-gray-800">
    CRM Login
  </h2>

  <input id="email" placeholder="Email"
    class="border w-full p-3 mb-3 rounded-lg" />

  <input id="password" type="password" placeholder="Password"
    class="border w-full p-3 mb-4 rounded-lg" />

  <button onclick="login()"
    class="bg-blue-600 text-white w-full p-3 rounded-lg">
    Login
  </button>

  <p id="error" class="text-red-500 mt-3 text-sm text-center"></p>

</div>

<script>

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{

    const res = await fetch(
      window.location.origin + "/auth/login",
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ email, password })
      }
    );

    const data = await res.json();

    console.log("LOGIN RESPONSE:", data);

    if(data && data.token){

      localStorage.setItem("token", data.token);

      if(data.user.role === "manager"){
        window.location.href = "manager-dashboard.html";
      }else{
        window.location.href = "employee-dashboard.html";
      }

    }else{
      document.getElementById("error").innerText =
        data?.error || "Login failed";
    }

  }catch(err){
    console.error(err);
    document.getElementById("error").innerText = "Server error";
  }

}

</script>

</body>
</html>
