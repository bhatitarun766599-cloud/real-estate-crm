<!DOCTYPE html>
<html>
<head>

<title>CRM Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-sm">

  <h2 class="text-xl font-semibold mb-6 text-center text-gray-800">
    CRM Login
  </h2>

  <input
    id="email"
    placeholder="Email"
    class="border w-full p-3 mb-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    class="border w-full p-3 mb-4 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
  />

  <button
    onclick="login()"
    class="bg-blue-600 hover:bg-blue-700 text-white w-full p-3 rounded-lg transition">
    Login
  </button>

  <p id="error" class="text-red-500 mt-3 text-sm text-center"></p>

</div>


<script>

/* ===============================
   LOGIN (UPDATED)
================================ */

async function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    document.getElementById("error").innerText = "Enter email & password";
    return;
  }

  try{

    const res = await apiRequest("/auth/login", "POST", {
      email,
      password
    });

    if(res && res.token){

      // ✅ SAVE TOKEN + USER
      setToken(res.token);
      setUser(res.user);

      // 🔥 ROLE BASED REDIRECT
      if(res.user.role === "manager"){
        window.location.href = "dashboard.html";
      }else{
        window.location.href = "employee-dashboard.html";
      }

    }else{
      document.getElementById("error").innerText =
        res?.error || "Login failed";
    }

  }catch(err){
    document.getElementById("error").innerText =
      "Server error";
  }

}

</script>

</body>
</html>
