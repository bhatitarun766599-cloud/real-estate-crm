<!DOCTYPE html>
<html>
<head>

<title>CRM Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-sm">

  <h2 class="text-xl font-semibold mb-6 text-center text-gray-800">
    CRM Login
  </h2>

  <input
    id="email"
    placeholder="Email"
    class="border w-full p-3 mb-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    class="border w-full p-3 mb-4 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
  />

  <button
    onclick="login()"
    class="bg-blue-600 hover:bg-blue-700 text-white w-full p-3 rounded-lg transition">
    Login
  </button>

  <p id="error" class="text-red-500 mt-3 text-sm text-center"></p>

</div>


<script>

/* ===============================
   LOGIN FUNCTION
================================ */

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{

    const data = await apiRequest(
      "/auth/login",
      "POST",
      { email, password }
    );

    if(data && data.token){

      // ✅ UNIFIED TOKEN SYSTEM
      localStorage.setItem("token", data.token);

      // redirect to main app
      window.location.href = "app.html";

    }else{

      document.getElementById("error").innerText =
        data?.error || "Login failed";

    }

  }catch(err){

    document.getElementById("error").innerText =
      "Server error";

  }

}

</script>

</body>
</html>
