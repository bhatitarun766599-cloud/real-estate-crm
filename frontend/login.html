<!DOCTYPE html>
<html>
<head>

<title>CRM Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">


<div class="bg-white p-8 rounded shadow w-full max-w-sm">

<h2 class="text-xl font-bold mb-6 text-center">CRM Login</h2>

<input
id="email"
placeholder="Email"
class="border w-full p-2 mb-3 rounded"
/>

<input
id="password"
type="password"
placeholder="Password"
class="border w-full p-2 mb-4 rounded"
/>

<button
onclick="login()"
class="bg-blue-500 text-white w-full p-2 rounded"
>
Login
</button>

<p id="error" class="text-red-500 mt-3 text-sm"></p>

</div>



<script>

// AUTO API SWITCH
const API_BASE =
 location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://real-estate-crm-cxtj.onrender.com";


async function login(){

 const email =
  document.getElementById("email").value;

 const password =
  document.getElementById("password").value;

 try{

  const res = await fetch(`${API_BASE}/auth/login`,{

   method:"POST",

   headers:{
    "Content-Type":"application/json"
   },

   body:JSON.stringify({
    email,
    password
   })

  });

  const data = await res.json();

  if(data.token){

   // SAVE TOKEN
   localStorage.setItem("crm_token",data.token);

   // REDIRECT
   window.location.href = "analytics.html";

  }else{

   document.getElementById("error").innerText =
    data.error || "Login failed";

  }

 }catch(err){

  console.error(err);

  document.getElementById("error").innerText =
   "Server connection error";

 }

}

</script>


</body>
</html>
