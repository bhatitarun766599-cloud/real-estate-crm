<!DOCTYPE html>
<html>
<head>

<title>CRM Analytics</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">CRM Analytics Dashboard</h1>


<div class="grid grid-cols-2 md:grid-cols-3 gap-4">

<div class="bg-white p-4 rounded shadow">
<p>Total Leads</p>
<h2 id="total" class="text-2xl font-bold">Loading...</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>Today's Leads</p>
<h2 id="today" class="text-2xl font-bold">Loading...</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>Interested Leads</p>
<h2 id="interested" class="text-2xl font-bold">Loading...</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>Deals Closed</p>
<h2 id="closed" class="text-2xl font-bold">Loading...</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>Lost Leads</p>
<h2 id="lost" class="text-2xl font-bold">Loading...</h2>
</div>

<div class="bg-white p-4 rounded shadow">
<p>Conversion Rate</p>
<h2 id="conversion" class="text-2xl font-bold">Loading...</h2>
</div>

</div>


<script>

// AUTO API SWITCH
const API_BASE =
 location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://your-backend-url.com";

async function loadAnalytics(){

 try{

  const res = await fetch(`${API_BASE}/leads/analytics`);

  const data = await res.json();

  document.getElementById("total").innerText = data.total;

  document.getElementById("today").innerText = data.today;

  document.getElementById("interested").innerText = data.interested;

  document.getElementById("closed").innerText = data.closed;

  document.getElementById("lost").innerText = data.lost;

  const conversion = data.total > 0
   ? (data.closed / data.total * 100).toFixed(1)
   : 0;

  document.getElementById("conversion").innerText =
   conversion + "%";

 }catch(err){

  console.error(err);

 }

}

// LOAD DATA
loadAnalytics();

// AUTO REFRESH EVERY 30s
setInterval(loadAnalytics,30000);

</script>


</body>
</html>
