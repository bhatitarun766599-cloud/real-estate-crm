<!DOCTYPE html>
<html>
<head>

<title>Employee Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-md w-80">

  <h2 class="text-xl font-semibold mb-6 text-center text-gray-800">
    Welcome Back 👋
  </h2>

  <input
    id="email"
    placeholder="Email"
    class="border p-3 w-full mb-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    class="border p-3 w-full mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
  />

  <button
    onclick="login()"
    class="bg-blue-600 hover:bg-blue-700 text-white w-full p-3 rounded-lg transition">
    Login
  </button>

  <p id="error" class="text-red-500 text-sm mt-3 text-center"></p>

</div>


<script>

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{

    const data = await apiRequest(
      "/employees/login",
      "POST",
      { email, password }
    );

    if(data && data.token){

  localStorage.setItem("token", data.token);

  // 🔥 ROLE BASED REDIRECT
  if(data.user.role === "manager"){
    window.location.href = "app.html";
  }else{
    window.location.href = "employee-dashboard.html";
  }

}

  }catch(err){
    document.getElementById("error").innerText = "Server error";
  }

}

</script>

</body>
</html>
