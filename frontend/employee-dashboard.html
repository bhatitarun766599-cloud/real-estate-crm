<!DOCTYPE html>
<html>
<head>

<title>Employee Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<div class="bg-white border-b px-6 py-4 flex justify-between items-center">
  <h1 class="text-lg font-semibold text-gray-800">👨‍💻 My Dashboard</h1>
  <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
</div>

<div class="p-6">

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-4 mb-6">

    <div class="bg-white p-4 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Today's Leads</p>
      <h2 id="todayCount" class="text-2xl font-bold">0</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm">
      <p class="text-gray-500 text-sm">Yesterday</p>
      <h2 id="yesterdayCount" class="text-2xl font-bold">0</h2>
    </div>

  </div>

  <!-- SEARCH -->
  <div class="mb-4 flex justify-between">
    <input id="search"
      placeholder="Search leads..."
      class="border p-2 rounded text-sm w-64"
      onkeyup="searchLeads()">
  </div>

  <!-- TABLE -->
  <div class="bg-white rounded-2xl shadow-sm overflow-x-auto">

    <table class="w-full text-sm">

      <thead>
        <tr class="border-b text-gray-500">
          <th class="p-3 text-left">Name</th>
          <th class="p-3 text-left">Phone</th>
          <th class="p-3 text-left">Source</th>
          <th class="p-3 text-left">Budget</th>
          <th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Actions</th>
        </tr>
      </thead>

      <tbody id="leadTable"></tbody>

    </table>

  </div>

</div>


<script>

/* ===============================
   SIMPLE AUTH CHECK (NO LOOP)
================================ */

const token = localStorage.getItem("token");

if(!token){
  window.location.href = "login.html";
}

/* ===============================
   SEARCH
================================ */
function searchLeads(){
 const input = document.getElementById("search").value.toLowerCase()
 const rows = document.querySelectorAll("#leadTable tr")

 rows.forEach(row=>{
  row.style.display =
   row.innerText.toLowerCase().includes(input) ? "" : "none"
 })
}

/* ===============================
   LOAD STATS
================================ */
async function loadStats(){

 const data = await apiRequest("/leads/stats");

 if(!data){
  console.log("Stats API failed");
  return;
}

 document.getElementById("todayCount").innerText = data.today;
 document.getElementById("yesterdayCount").innerText = data.yesterday;

}

/* ===============================
   LOAD LEADS
================================ */
async function loadLeads(){

 const leads = await apiRequest("/leads");

 if(!leads){
  console.log("Leads API failed");
  return;
}

 const table = document.getElementById("leadTable");
 table.innerHTML = "";

 leads.forEach(l=>{

 table.innerHTML += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3 font-medium">${l.name}</td>

<td class="p-3">
  ${l.phone}
  <div class="flex gap-2 mt-1">
    <a href="tel:${l.phone}" class="text-green-600 text-xs">📞 Call</a>
    <a href="https://wa.me/${l.phone}" target="_blank" class="text-blue-600 text-xs">💬 WhatsApp</a>
  </div>
</td>

<td class="p-3">${l.source || "-"}</td>
<td class="p-3">${l.budget || "-"}</td>

<td class="p-3">

<select
 class="border rounded p-1"
 onchange="updateLead(${l.id}, this.value)">

<option ${l.status==="new"?"selected":""}>new</option>
<option ${l.status==="contacted"?"selected":""}>contacted</option>
<option ${l.status==="interested"?"selected":""}>interested</option>
<option ${l.status==="not_interested"?"selected":""}>not_interested</option>
<option ${l.status==="closed"?"selected":""}>closed</option>

</select>

</td>

<td class="p-3">

<button onclick="addRemark(${l.id})"
 class="bg-gray-200 px-2 py-1 rounded text-xs mr-2">
 Remark
</button>

<button onclick="addFollowup(${l.id})"
 class="bg-green-500 text-white px-2 py-1 rounded text-xs">
 Follow-up
</button>

</td>

</tr>

`
 })

}

/* ===============================
   UPDATE STATUS + REMARK
================================ */
async function updateLead(id,status){

 const remark = prompt("Add remark (optional)");

 await apiRequest(`/leads/update/${id}`, "PUT", {
  status,
  remark
 });

}

/* ===============================
   ADD REMARK
================================ */
async function addRemark(id){

 const remark = prompt("Enter remark");

 if(!remark) return;

 await apiRequest(`/leads/update/${id}`, "PUT", {
  status: "contacted",
  remark
 });

 alert("Saved");

}

/* ===============================
   FOLLOWUP
================================ */
async function addFollowup(id){

 const date = prompt("Follow-up date (YYYY-MM-DD)");
 const notes = prompt("Notes");

 await apiRequest("/leads/followup", "POST", {
  lead_id:id,
  followup_date:date,
  notes:notes
 });

 alert("Follow-up added");

}

/* INIT */
loadStats();
loadLeads();

</script>

</body>
</html>
