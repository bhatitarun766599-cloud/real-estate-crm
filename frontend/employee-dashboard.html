<!DOCTYPE html>
<html>
<head>

<title>My Leads</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<div class="bg-white border-b px-6 py-4 flex justify-between items-center">
  <h1 class="text-lg font-semibold text-gray-800">📋 My Leads</h1>
  <button onclick="logout()" class="text-red-500 text-sm">Logout</button>
</div>

<div class="p-6">

  <!-- SEARCH -->
  <div class="mb-4 flex justify-between">
    <input id="search"
      placeholder="Search leads..."
      class="border p-2 rounded text-sm w-64"
      onkeyup="searchLeads()">
  </div>

  <!-- TABLE -->
  <div class="bg-white rounded-2xl shadow-sm overflow-x-auto">

    <table class="w-full text-sm">

      <thead>
        <tr class="border-b text-gray-500">
          <th class="p-3 text-left">Name</th>
          <th class="p-3 text-left">Phone</th>
          <th class="p-3 text-left">City</th>
          <th class="p-3 text-left">Status</th>
          <th class="p-3 text-left">Action</th>
        </tr>
      </thead>

      <tbody id="leadTable"></tbody>

    </table>

  </div>

</div>


<script>

/* ===============================
   AUTH CHECK
================================ */

const token = localStorage.getItem("token");

if(!token){
  window.location = "login.html";
}


/* ===============================
   SEARCH
================================ */

function searchLeads(){
 const input = document.getElementById("search").value.toLowerCase()
 const rows = document.querySelectorAll("#leadTable tr")

 rows.forEach(row=>{
  row.style.display =
   row.innerText.toLowerCase().includes(input) ? "" : "none"
 })
}


/* ===============================
   LOAD LEADS (JWT BASED)
================================ */

async function loadLeads(){

 const leads = await apiRequest("/leads/my");

 const table = document.getElementById("leadTable");
 table.innerHTML = "";

 leads.forEach(l=>{

 table.innerHTML += `

<tr class="border-b hover:bg-gray-50">

<td class="p-3 font-medium">${l.name}</td>
<td class="p-3">${l.phone}</td>
<td class="p-3">${l.city || ""}</td>

<td class="p-3">

<select
 class="border rounded p-1"
 onchange="updateStatus(${l.id},this.value)">

<option ${l.status==="New"?"selected":""}>New</option>
<option ${l.status==="Contacted"?"selected":""}>Contacted</option>
<option ${l.status==="Interested"?"selected":""}>Interested</option>
<option ${l.status==="Not Interested"?"selected":""}>Not Interested</option>
<option ${l.status==="Closed"?"selected":""}>Closed</option>

</select>

</td>

<td class="p-3">

<button
 onclick="addFollowup(${l.id})"
 class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-xs">

Follow-up

</button>

</td>

</tr>

`
 })

}


/* ===============================
   UPDATE STATUS
================================ */

async function updateStatus(id,status){
 await apiRequest(`/leads/status/${id}`,"PUT",{status})
}


/* ===============================
   FOLLOWUP
================================ */

async function addFollowup(id){

 const date = prompt("Follow-up date YYYY-MM-DD")
 const notes = prompt("Notes")

 await apiRequest("/leads/followup","POST",{
  lead_id:id,
  followup_date:date,
  notes:notes
 })

 alert("Follow-up added")
}


/* INIT */
loadLeads();

</script>

</body>
</html>
