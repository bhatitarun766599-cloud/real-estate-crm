<!DOCTYPE html>
<html>
<head>

<title>Lead Pipeline</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="api.js"></script>

</head>

<body class="bg-gray-100 p-4">

<h1 class="text-2xl font-bold mb-6">
Lead Pipeline
</h1>


<div class="flex gap-4 overflow-x-auto">


<!-- NEW -->

<div class="bg-white p-3 rounded shadow w-64">

<h2 class="font-bold mb-2">New</h2>

<div id="New" class="pipeline space-y-2"></div>

</div>



<!-- INTERESTED -->

<div class="bg-white p-3 rounded shadow w-64">

<h2 class="font-bold mb-2">Interested</h2>

<div id="Interested" class="pipeline space-y-2"></div>

</div>



<!-- SITE VISIT -->

<div class="bg-white p-3 rounded shadow w-64">

<h2 class="font-bold mb-2">Site Visit</h2>

<div id="Site Visit" class="pipeline space-y-2"></div>

</div>



<!-- CLOSED -->

<div class="bg-white p-3 rounded shadow w-64">

<h2 class="font-bold mb-2">Deal Closed</h2>

<div id="Deal Closed" class="pipeline space-y-2"></div>

</div>



<!-- LOST -->

<div class="bg-white p-3 rounded shadow w-64">

<h2 class="font-bold mb-2">Lost Lead</h2>

<div id="Lost Lead" class="pipeline space-y-2"></div>

</div>


</div>



<script>

let draggedLead = null



// LOAD PIPELINE

async function loadPipeline(){

 const leads =
 await apiRequest("/leads/all")

 document.querySelectorAll(".pipeline")
 .forEach(col=>{
  col.innerHTML=""
 })

 leads.forEach(lead=>{

 const card =
 document.createElement("div")

 card.className =
 "bg-blue-100 p-2 rounded shadow cursor-move"

 card.draggable=true

 card.innerHTML=`

<strong>${lead.name}</strong><br>
${lead.phone}<br>
${lead.city || ""}

`

 card.addEventListener("dragstart",()=>{
 draggedLead = lead.id
 })

 const column =
 document.getElementById(lead.status)

 if(column){
  column.appendChild(card)
 }

 })

}



// DRAG EVENTS

document.querySelectorAll(".pipeline")
.forEach(col=>{

 col.addEventListener("dragover",(e)=>{
  e.preventDefault()
 })

 col.addEventListener("drop",async function(){

 const status = this.id

 await apiRequest(
 `/leads/status/${draggedLead}`,
 "PUT",
 {status}
 )

 loadPipeline()

 })

})



loadPipeline()

</script>


</body>
</html>
